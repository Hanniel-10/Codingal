<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
   <h1>My Delivery Tracker</h1>
   <button onclick="saveOrder()">Save Order</button>
   <button onclick="startDelivery()">Start Delivery</button>

   <div>JSON Text: <span id="json-text"></span></div>
   <div>Loaded Item: <span id="loaded-item"></span></div>
   <div>Loaded Price: <span id="loaded-price"></span></div>
   <div>Status: <span id="status"></span></div>
   <div>Result: <span id="result"></span></div>
   
   <script>
// JSON - the order stroed as a JavaScript object
let order = {
   item:"Pizza", 
   price: 5,
   shop: "My snack shop"
};

// JSON.stringify() and JSON.parse()
function saveOrder() {
   let jsonText = JSON.stringify(order);
   let loadedOrder = JSON.parse(jsonText);

    document.getElementById("json-text").innerHTML = jsonText;
    document.getElementById("loaded-item").innerHTML = loadedOrder.item;
    document.getElementById("loaded-price").innerHTML = "$" + loadedOrder.price
}
// delay() -waits ms milliseconds - do not change this
function delay(ms) {
   return new Promise(function (resolve) {
      setTimeout(resolve, ms);
   });
}

// async and await - track the delivery step by step
async function startDelivery() {
    document.getElementById(result).innerHTML ="";

//setTimeout with a callback function - runs after 1 second
document.getElementById("status").innerHTML = "Order recieved!";
setTimeout(function (){
    document.getElementById("status").innerHTML = "Kitchen is preparring...";
},1000);

// await - pause for 3 second
await delay(3000);
document.getElementById("status").innerHTML = "Out for delivery!";

// await - pause for 2 second
await delay(2000);
document.getElementById(result).innerHTML = "Your order has arrived!";
}
    
   </script>

</body>
</html>
